version: '3.8'

services:
  php:
    build: .
    image: php-template
    ports:
      - "8092:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=
      - MYSQL_DB=phpTemplate
    depends_on:
      - db

  db:
    image: mariadb:10.6.22
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "1"
    ports:
      - "4308:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  dbdata:
